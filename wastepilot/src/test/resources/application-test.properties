# ============================================================
# Test profile — uses H2 in-memory database (no MySQL needed)
# ============================================================

spring.datasource.url=jdbc:h2:mem:wastepilot_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway disabled for tests — H2 create-drop handles schema
spring.flyway.enabled=false

# create-drop: create schema on startup, drop on shutdown
# Hibernate auto-detects H2Dialect — no explicit dialect needed
spring.jpa.hibernate.ddl-auto=create-drop

# Defer datasource init so all tables are created before FK constraints are applied
spring.jpa.defer-datasource-initialization=true

# Ignore DDL constraint errors (FK ordering issue with H2) — non-fatal
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

# Keep time zone consistent with production
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Quiet logs during tests
logging.level.org.springframework=WARN
logging.level.org.hibernate.tool.schema=ERROR
logging.level.com.project.wastepilot=INFO

# Security properties required by SecurityProps @ConfigurationProperties
wastepilot.security.cors-allowed-origins[0]=http://localhost:5173
wastepilot.security.max-upload-size-mb=10
wastepilot.security.allowed-upload-content-types[0]=image/png
wastepilot.security.allowed-upload-content-types[1]=image/jpeg
wastepilot.security.allowed-upload-content-types[2]=image/webp
wastepilot.security.rate-limit.enabled=false
wastepilot.security.rate-limit.requests-per-minute=120
