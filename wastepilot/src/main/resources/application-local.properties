# ============================================================
# LOCAL dev profile — uses H2 in-memory DB, no MySQL needed
# Run with: .\mvnw spring-boot:run -Dspring-boot.run.profiles=local
# ============================================================

spring.datasource.url=jdbc:h2:mem:wastepilot_local;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway disabled — H2 create-drop handles schema
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Show SQL for easier local debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security properties
wastepilot.security.cors-allowed-origins[0]=http://localhost:5173
wastepilot.security.max-upload-size-mb=10
wastepilot.security.allowed-upload-content-types[0]=image/png
wastepilot.security.allowed-upload-content-types[1]=image/jpeg
wastepilot.security.allowed-upload-content-types[2]=image/webp
wastepilot.security.rate-limit.enabled=false
wastepilot.security.rate-limit.requests-per-minute=120

# Lower log noise for local dev
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.tool.schema=ERROR
logging.level.com.project.wastepilot=DEBUG
