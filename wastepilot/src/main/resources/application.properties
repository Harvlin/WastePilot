spring.application.name=wastepilot

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:wastepilot}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:10MB}

logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}

# Security Configuration
wastepilot.security.cors-allowed-origins[0]=http://localhost:5173
wastepilot.security.max-upload-size-mb=10
wastepilot.security.allowed-upload-content-types[0]=image/png
wastepilot.security.allowed-upload-content-types[1]=image/jpeg
wastepilot.security.allowed-upload-content-types[2]=image/webp
wastepilot.security.rate-limit.enabled=true
wastepilot.security.rate-limit.requests-per-minute=120
